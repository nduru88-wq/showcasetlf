<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mors telefon</title>

  <!-- iPhone hjemmeskærm ikon -->
  <link rel="apple-touch-icon" sizes="180x180" href="telefon.png" />
  <link rel="apple-touch-icon" href="telefon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mors telefon" />
  <link rel="icon" href="telefon.png" />

  <style>
    :root{
      --bg:#0b1220;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.12);
      --text:#fff;
      --muted:rgba(255,255,255,.75);
      --stroke:rgba(255,255,255,.12);
      --radius:26px;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --gap:22px;
      --max:980px;

      --openBg:rgba(0,255,170,.15);
      --openBorder:rgba(0,255,170,.35);
      --openDot:rgba(0,255,170,1);

      --closedBg:rgba(255,90,90,.12);
      --closedBorder:rgba(255,90,90,.28);
      --closedDot:rgba(255,90,90,1);

      --okGreen:#27d17c;
      --okGreen2:#1fb66c;
    }

    *{box-sizing:border-box}
    html,body{
      height:100%;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial
    }

    body{
      background:
        radial-gradient(1200px 800px at 50% 0%, rgba(80,140,255,.22), transparent 55%),
        radial-gradient(900px 600px at 10% 90%, rgba(0,255,170,.10), transparent 55%),
        var(--bg);
      color:var(--text);
    }

    .page{
      min-height:100%;
      padding:calc(20px + env(safe-area-inset-top)) 20px
              calc(24px + env(safe-area-inset-bottom));
      display:flex;
      justify-content:center;
    }

    .wrap{
      width:100%;
      max-width:var(--max);
      display:flex;
      flex-direction:column;
      gap:22px;
    }

    /* HEADER */
    .header{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      padding:18px;
    }

    /* PHONE ICON – TWICE AS BIG */
    .topIcon{
      width:min(300px,70vw);
      aspect-ratio:1;
      border-radius:40px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      display:grid;
      place-items:center;
    }

    .topIcon img{
      width:85%;
      height:85%;
      object-fit:contain;
    }

    h1{
      margin:0;
      font-size:clamp(26px,4vw,40px);
    }

    .hint{
      margin:0;
      color:var(--muted);
      font-size:18px;
      text-align:center;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:var(--gap);
    }

    .card{
      text-decoration:none;
      color:inherit;
      background:linear-gradient(180deg,var(--card2),var(--card));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      min-height:240px;
      padding:18px;
      display:grid;
      grid-template-rows:1fr auto;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      cursor:pointer;
    }

    .card:active{transform:scale(.97)}

    /* AVATAR – BIGGER */
    .avatar{
      width:min(220px,50vw);
      aspect-ratio:1;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid var(--stroke);
      display:grid;
      place-items:center;
      margin:auto;
      overflow:hidden;
    }

    .avatar svg{
      width:100%;
      height:100%;
      display:block;
    }

    .meta{text-align:center}

    .name{
      margin:6px 0 2px;
      font-size:clamp(22px,3.6vw,30px);
      font-weight:900;
    }

    .phone{
      margin:0;
      font-size:18px;
      color:rgba(255,255,255,.8);
    }

    .callTag{
      margin:14px auto 0;
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:12px 18px;
      border-radius:999px;
      font-weight:800;
      font-size:18px;
      border:1px solid transparent;
      background:rgba(255,255,255,.08);
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:rgba(255,255,255,.7);
    }

    .callTag.open{
      background:var(--openBg);
      border-color:var(--openBorder);
    }
    .callTag.open .dot{ background:var(--openDot); }

    .callTag.closed{
      background:var(--closedBg);
      border-color:var(--closedBorder);
    }
    .callTag.closed .dot{ background:var(--closedDot); }

    /* MODAL */
    .modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:22px;
      z-index:9999;
    }
    .modalBackdrop.show{ display:flex; }

    .modal{
      width:min(520px, 92vw);
      background:#0b1220;
      border:1px solid rgba(255,255,255,.14);
      border-radius:22px;
      box-shadow:0 18px 50px rgba(0,0,0,.55);
      padding:18px 18px 16px;
      text-align:center;
    }
    .modal h2{
      margin:6px 0 10px;
      font-size:22px;
    }
    .modal p{
      margin:0 0 14px;
      color:rgba(255,255,255,.82);
      font-size:18px;
      line-height:1.35;
    }
    .modal .btnRow{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:10px;
    }
    .okBtn{
      appearance:none;
      border:0;
      padding:12px 20px;
      border-radius:14px;
      font-weight:900;
      font-size:18px;
      color:#062012;
      background:linear-gradient(180deg, var(--okGreen), var(--okGreen2));
      box-shadow:0 10px 24px rgba(0,0,0,.35);
      cursor:pointer;
    }
    .okBtn:active{ transform:scale(.98); }
  </style>
</head>

<body>
<div class="page"><div class="wrap">

    <div class="topIcon">

    </div>
    <h1>Mors telefon</h1>

          <circle cx="100" cy="110" r="62" fill="#e8c2a3"/>
          <path d="M50 98c6-38 28-60 50-62 28 2 52 22 56 62-12-10-33-20-56-20-24 0-43 8-50 20z" fill="#2f2f33"/>
          <circle cx="78" cy="116" r="7" fill="#1a1a1a"/>
          <circle cx="122" cy="116" r="7" fill="#1a1a1a"/>
          <path d="M84 146c8 8 24 8 32 0" fill="none" stroke="#6c3727" stroke-width="6" stroke-linecap="round"/>
          <path d="M74 132c10-6 16-6 26 0" fill="none" stroke="#1f1f22" stroke-width="6" stroke-linecap="round" opacity=".75"/>
          <path d="M100 138c0 12 0 12 0 12" stroke="#6c3727" stroke-width="6" stroke-linecap="round"/>
          <path d="M62 160c8 24 68 24 76 0" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="10" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="meta">
        <p class="name">Ole</p>
        <p class="phone">+45 12 34 56 78</p>

      <div class="avatar" aria-hidden="true">
        <!-- Tegnet kvinde -->

<!-- Modal -->
<div class="modalBackdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h2 id="modalTitle">Lukket</h2>
    <p id="modalText">Kan ikke ringes til i dette tidsrum</p>
    <div class="btnRow">
      <button class="okBtn" id="okBtn" type="button">OK</button>
    </div>
  </div>
</div>

<!-- Audio (læg spærring.mp3 i samme mappe) -->
<audio id="blockedAudio" preload="auto" src="spærring.mp3"></audio>

<script>
  const modal = document.getElementById('modal');
  const okBtn = document.getElementById('okBtn');
  const audioEl = document.getElementById('blockedAudio');

  let autoCloseTimer = null;

  function parseHHMM(s){
    const [h,m] = s.split(':').map(Number);
    return (h*60 + m);
  }

  function minutesNow(){
    const d = new Date();
    return d.getHours()*60 + d.getMinutes();
  }

  // Returnerer true hvis tidspunktet ligger i "spærre-intervallet"
  // Understøtter både normale intervaller (08-22) og over-midnat (22-08)
  function isInBlockedWindow(nowMin, startStr, endStr){
    const start = parseHHMM(startStr);
    const end = parseHHMM(endStr);

    if (start === end) return true; // hele døgnet (teoretisk)
    if (start < end){
      return nowMin >= start && nowMin < end;
    } else {
      // Over midnat: fx 22:00 -> 08:00
      return (nowMin >= start) || (nowMin < end);
    }
  }

  function setTagState(card, blocked){
    const tag = card.querySelector('.callTag');
    const tagText = card.querySelector('.tagText');

    tag.classList.toggle('open', !blocked);
    tag.classList.toggle('closed', blocked);
    tagText.textContent = blocked ? 'LUKKET' : 'RING';
  }

  function updateAllStates(){
    const now = minutesNow();
    document.querySelectorAll('.card').forEach(card=>{
      const bs = card.getAttribute('data-block-start');
      const be = card.getAttribute('data-block-end');
      const blocked = isInBlockedWindow(now, bs, be);
      card.dataset.blocked = blocked ? '1' : '0';
      setTagState(card, blocked);
    });
  }

  function closeModal(){
    modal.classList.remove('show');

    // stop audio hvis det kører
    try{
      audioEl.pause();
      audioEl.currentTime = 0;
    }catch(e){}

    if (autoCloseTimer){
      clearTimeout(autoCloseTimer);
      autoCloseTimer = null;
    }
  }

  async function showBlockedPrompt(){
    modal.classList.add('show');

    // Spil lyd (klik/tryk tæller som bruger-gesture, så det plejer at virke)
    try{
      audioEl.currentTime = 0;
      await audioEl.play();

      // Luk når lyden er færdig
      audioEl.onended = () => closeModal();
    }catch(e){
      // Hvis autoplay blokeres, så luk efter 2.5 sek som fallback
      autoCloseTimer = setTimeout(closeModal, 2500);
    }
  }

  okBtn.addEventListener('click', closeModal);

  // Klik på kort
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', async (e)=>{
      e.preventDefault();

      const tel = card.getAttribute('data-tel');
      const blocked = card.dataset.blocked === '1';

      if (blocked){
        await showBlockedPrompt();
        return;
      }

      // Åben opkald
      window.location.href = 'tel:' + tel;
    });
  });

  // Opdater ved load og derefter hvert 15. sekund (så status skifter tæt på 08/22)
  updateAllStates();
  setInterval(updateAllStates, 15000);
</script>

</body>
</html>
